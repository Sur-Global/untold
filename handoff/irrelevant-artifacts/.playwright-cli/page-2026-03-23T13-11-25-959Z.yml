        - figure [ref=e71]:
          - img "Hvordan politiets overvågningsteknologi rammer de sorte samfund" [ref=e73]
        - generic [ref=e74]:
          - paragraph [ref=e75]: Overalt på det afrikanske kontinent indføres en ny bølge af politiovervågningsteknologi i overvejende sorte lokalsamfund — ofte uden offentlig debat, uden uafhængig kontrol og uden mulighed for at klage for dem, der fejlagtigt identificeres.
          - paragraph [ref=e76]: I Lagos har delstatsregeringen i al stilhed opsat tusindvis af ansigtsgenkendelseskameraer i kvarterer med lav indkomst. I Nairobi bruger politiet software til præventiv politiarbejde, der er trænet på anholdelsesregistre, som i uforholdsmæssig høj grad afspejler historisk overpolicering. I Cape Town anvender et pilotprojekt nummerpladescannere og biometriske databaser til at spore bevægelser rundt om i byen.
          - paragraph [ref=e77]: "\"Algoritmen ser dig ikke som et menneske. Den ser dig som et datapunkt,\" siger dr. Nkechi Okonkwo, forsker i digitale rettigheder ved African Network for Surveillance Accountability. \"Og når det datapunkt er forkert – hvilket det ofte er for mørkere hudfarver – rammer konsekvenserne udelukkende den enkelte person, ikke systemet.\""
          - paragraph [ref=e78]: Undersøgelser viser gang på gang, at kommercielle ansigtsgenkendelsessystemer har betydeligt højere fejlprocenter for mørkhudede kvinder og mænd, hvor de i nogle tilfælde identificerer dem forkert i op til 34 % af tilfældene, sammenlignet med fejlprocenter på under 1 % for lyshudede mænd. Alligevel købes disse systemer fra internationale leverandører og tages i brug med minimal lokal testning eller validering.
