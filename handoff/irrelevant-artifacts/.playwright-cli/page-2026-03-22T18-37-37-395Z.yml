        - img "Mother Tongue Matters" [ref=e60]
        - generic [ref=e61]:
          - paragraph [ref=e62]: The evidence is not ambiguous. Decades of educational research consistently finds that children learn foundational concepts faster, retain information better, and develop stronger critical thinking skills when taught in their mother tongue, at least in the early years of schooling.
          - img "Children learning to read in their first language" [ref=e63]
          - heading "Yet Most African Children Are Taught in Foreign Languages" [level=2] [ref=e64]
          - paragraph [ref=e65]: Across most of sub-Saharan Africa, children are taught in English, French, or Portuguese from their first day of school — languages that many of them do not speak at home and that their parents may not speak at all.
          - blockquote [ref=e66]:
            - paragraph [ref=e67]: "\"The real barrier is prestige. Decades of colonial education have created hierarchies in which European languages are associated with education and opportunity, while African languages are associated with tradition and limited prospects. These are colonial constructions — but they are deeply internalised.\""
          - heading "The Evidence for Mother Tongue Instruction" [level=2] [ref=e68]
          - list [ref=e69]:
            - listitem [ref=e70]:
              - paragraph [ref=e71]: "UNICEF: children taught in mother tongue for first 6 years show significantly higher secondary school completion rates"
            - listitem [ref=e72]:
              - paragraph [ref=e73]: "South Africa's Language in Education Policy: schools using home languages as medium of instruction show improved maths scores"
            - listitem [ref=e74]:
              - paragraph [ref=e75]: "Ethiopia's regional language education policy: strongly correlated with reduced dropout rates in primary school"
            - listitem [ref=e76]:
              - paragraph [ref=e77]: "Papua New Guinea's Tok Ples Pre-school programme: children enter formal schooling better prepared across all subjects"
          - heading "What Needs to Happen" [level=3] [ref=e78]
          - paragraph [ref=e79]: Reversing this requires sustained investment in producing educational materials in African languages, training teachers to deliver high-quality instruction, and — most difficult of all — changing the social prestige calculus that makes African-language instruction feel like a second-best option. The research is clear. The will to act on it is what is lacking.
