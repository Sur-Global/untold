            - text: . The category of articles constitutes a part of speech. These words represent a specific object, depending on the situation, but a is less specific than the.
          - paragraph [ref=e53]: Articles combine with nouns to form noun phrases, and typically specify the grammatical definiteness of the noun phrase. In English, the and a (rendered as an when followed by a vowel sound) are the definite and indefinite articles respectively. Articles in many other languages also carry additional grammatical information such as gender, number, and case. Articles are part of a broader category called determiners, which also include demonstratives, possessive determiners, and quantifiers. In linguistic interlinear glossing, articles are abbreviated as ART.
          - paragraph [ref=e54]: Types of article
          - paragraph [ref=e55]: Definite article
          - paragraph [ref=e56]: "\"Definite article\" redirects here. For the comedy album, see Definite Article."
          - paragraph [ref=e57]: A definite article is an article that marks a definite noun phrase. Definite articles, such as the English the, are used to refer to a particular member of a group. It may be something that the speaker has already mentioned, or it may be something uniquely specified.
          - paragraph [ref=e58]: For example, Sentence 1 uses the definite article and thus expresses a request for a particular book. In contrast, Sentence 2 uses an indefinite article and thus conveys that the speaker would be satisfied with any book.
          - paragraph [ref=e59]: Give me the book.
          - paragraph [ref=e60]: Give me a book.
          - paragraph [ref=e61]: "The definite article can also be used in English to indicate a specific class among other classes:"
          - paragraph [ref=e62]: The cabbage white butterfly lays its eggs on members of the Brassica genus.
          - paragraph [ref=e63]: However, recent developments show that definite articles are morphological elements linked to certain noun types due to lexicalization. Under this point of view, definiteness does not play a role in the selection of a definite article more than the lexical entry attached to the article.[clarification needed][1][2]
          - paragraph [ref=e64]: Some languages (such as the continental North Germanic languages, Bulgarian or Romanian) have definite articles only as suffixes.
