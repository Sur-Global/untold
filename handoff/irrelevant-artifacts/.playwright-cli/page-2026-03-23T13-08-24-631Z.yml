        - figure [ref=e71]:
          - img "How Police Surveillance Tech Is Targeting Black Communities" [ref=e73]
        - generic [ref=e74]:
          - paragraph [ref=e75]: Across the African continent, a new wave of police surveillance technology is being deployed in predominantly Black communities — often with no public debate, no independent oversight, and no recourse for those misidentified.
          - paragraph [ref=e76]: In Lagos, the state government has quietly installed thousands of facial recognition cameras in low-income neighbourhoods. In Nairobi, police are using predictive policing software trained on arrest records that disproportionately reflect historical over-policing. In Cape Town, a pilot program uses license plate readers and biometric databases to track movement across the city.
          - paragraph [ref=e77]: "\"The algorithm does not see you as a person. It sees you as a data point,\" says Dr. Nkechi Okonkwo, a digital rights researcher at the African Network for Surveillance Accountability. \"And when that data point is wrong — which it frequently is for darker-skinned faces — the consequences fall entirely on the individual, not on the system.\""
          - paragraph [ref=e78]: Studies consistently show that commercial facial recognition systems have significantly higher error rates for dark-skinned women and men, in some cases misidentifying them up to 34% of the time, compared to error rates below 1% for light-skinned men. Yet these systems are being purchased from international vendors and deployed with minimal local testing or validation.
