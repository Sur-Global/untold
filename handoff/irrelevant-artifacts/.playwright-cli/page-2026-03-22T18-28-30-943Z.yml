        - img "Who Owns the Algorithm?" [ref=e60]
        - generic [ref=e61]:
          - paragraph [ref=e62]: Every AI system encodes the values, assumptions, and blind spots of those who built it. When a hiring algorithm trained on decades of Silicon Valley employment data is deployed to filter job applications in Lagos or Nairobi, it doesn't just assess candidates — it replicates a specific vision of who is "employable."
          - heading "The Quiet Colonialism of Code" [level=2] [ref=e63]
          - paragraph [ref=e64]: This is the quiet colonialism of the algorithmic age. Unlike the explicit coercion of historical colonialism, algorithmic power operates through the appearance of neutrality and efficiency. The system is just math, we are told. The model simply reflects patterns in the data.
          - paragraph [ref=e65]: But data is never neutral. It is a historical record, and history is written by those with power. When African governments and companies adopt AI systems built elsewhere — often under favourable commercial terms or donor-funded development programmes — they are also adopting the epistemological frameworks embedded in those systems.
          - blockquote [ref=e66]:
            - paragraph [ref=e67]: "\"I am because we are.\" The Ubuntu principle offers a fundamentally different basis for thinking about individual assessment, community impact, and systemic risk than the liberal individualism that underpins most current AI ethics frameworks."
          - heading "What Would African-Built AI Look Like?" [level=2] [ref=e68]
          - paragraph [ref=e69]: What would African-built AI look like? Not just AI trained on African languages or local datasets, but AI systems that reflect African philosophical frameworks, communal values, and ways of knowing.
          - heading "The Case for AI Sovereignty" [level=3] [ref=e70]
          - paragraph [ref=e71]: "This is not an argument against AI. It is an argument for AI sovereignty: the right of communities to shape, interrogate, and where necessary reject the algorithmic systems that govern their lives. Without that sovereignty, digital transformation becomes just another vector for dependency."
          - list [ref=e72]:
            - listitem [ref=e73]:
              - paragraph [ref=e74]: Data governance frameworks co-designed with communities
            - listitem [ref=e75]:
              - paragraph [ref=e76]: Open-source models trained on African-language corpora
            - listitem [ref=e77]:
              - paragraph [ref=e78]: Regulatory capacity built in African institutions, not outsourced to foreign consultants
            - listitem [ref=e79]:
              - paragraph [ref=e80]: Public AI infrastructure owned by African states and civil society
