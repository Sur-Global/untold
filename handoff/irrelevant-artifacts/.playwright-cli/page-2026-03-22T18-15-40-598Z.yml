        - img "AI Governance Without the South" [ref=e60]
        - generic [ref=e61]:
          - paragraph [ref=e62]: The global governance of artificial intelligence is being shaped by a remarkably narrow set of actors. The EU AI Act, the United States Executive Order on AI, the G7 Hiroshima AI Process, the OECD AI Principles — all of these have been driven by rich, technologically advanced nations with large domestic AI industries.
          - paragraph [ref=e63]: "The Global South is largely absent from these conversations, except as an afterthought: a market to be entered, a population to be served, or a source of cheap data labelling labour. The assumption is that governance frameworks developed in Washington, Brussels, and Tokyo will be universal — or that developing nations will simply adopt them wholesale, as they adopted WTO rules and Basel banking accords."
          - paragraph [ref=e64]: This assumption deserves scrutiny. AI systems deployed in India, Nigeria, or Indonesia face different contexts, different failure modes, and different stakes than the same systems deployed in Germany or California. A content moderation algorithm calibrated for English-language text will behave unpredictably in Tamil, Yoruba, or Bahasa. A facial recognition system trained predominantly on European faces will have higher error rates for darker-skinned individuals — with consequences that range from inconvenient to deadly when deployed by police forces.
          - paragraph [ref=e65]: Southern nations are not passive recipients of AI technology. India is building its own large language models. Nigeria has a growing AI startup ecosystem. Indonesia is investing in national AI infrastructure. These efforts deserve governance frameworks that reflect their contexts and values, not just compliance templates designed for Silicon Valley.
          - paragraph [ref=e66]: The urgency is real. AI governance architecture is being built now, and path dependency is strong. The frameworks being written today will shape the technology — and its power distribution — for decades. If the Global South is not at the table, it will be on the menu.
