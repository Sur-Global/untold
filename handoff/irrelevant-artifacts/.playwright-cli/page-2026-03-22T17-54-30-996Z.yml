        - img "Who Owns the Algorithm?" [ref=e53]
        - generic [ref=e54]:
          - heading "The Colonial Logic of Imported AI" [level=2] [ref=e55]
          - paragraph [ref=e56]: "Every algorithm encodes a worldview. The question is: whose worldview? When a facial recognition system trained predominantly on white faces is deployed at Nairobi's airports, that is not a neutral technical decision. It is a geopolitical one."
          - paragraph [ref=e57]: African governments and institutions are increasingly adopting AI systems built elsewhere, often with little transparency about how they work, what data trained them, or what values they embed. The continent is being positioned as a consumer of AI, not a creator.
          - 'heading "Counter-Currents: Building Local" [level=2] [ref=e58]'
          - paragraph [ref=e59]: But there is another story being told in less prominent spaces. In Kigali, researchers at the African Institute for Mathematical Sciences are building language models trained on Kinyarwanda, Swahili, and Amharic. In Lagos, a collective of engineers is developing credit-scoring systems that account for informal economies rather than dismissing them.
          - paragraph [ref=e60]: The question of who owns the algorithm is ultimately a question of power. Data generated by African users — their behaviors, preferences, social networks — is currently harvested by foreign platforms and used to train systems that are then sold back to African markets at a premium.
          - heading "Data Sovereignty as a Framework" [level=2] [ref=e61]
          - paragraph [ref=e62]: A different model is possible. Data sovereignty, as articulated by movements like the African Declaration on Internet Rights and Freedoms, starts from the premise that communities should control the data generated from their activities. This is not anti-technology. It is pro-justice.
          - paragraph [ref=e63]: The path forward requires investment in local AI research capacity, regulatory frameworks that protect data within jurisdictions, and most importantly, a reorientation of what AI is for. Technology that serves African communities must be built with African communities — not merely tested on them.
